name: manuals-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emacs and Texinfo
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox texinfo

      - name: Build manuals from org
        run: |
          scripts/build-manuals.sh

      - name: Run test suite
        run: |
          emacs -Q --batch -L . -L test \
            -l test/looking-glass-test.el \
            -f ert-run-tests-batch-and-exit

      - name: Upload built manuals artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-manuals
          path: build/manuals/info
